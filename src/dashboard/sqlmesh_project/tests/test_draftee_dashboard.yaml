test_draftee_dashboard_orders_by_name_round_pick:
  model: dashboards.draftee_dashboard
  description: Results are ordered by draftee name, round, then overall pick
  inputs:
    cleaned.drafter:
      rows:
        - movie: Movie B
          name: Bob
          overall_pick: 2
          round: 1
        - movie: Movie A
          name: Alice
          overall_pick: 1
          round: 1
        - movie: Movie C
          name: Alice
          overall_pick: 3
          round: 2
    combined.base_query:
      rows: []
    cleaned.round_multiplier_overrides:
      rows: []
    cleaned.movie_multiplier_overrides:
      rows: []
  outputs:
    query:
      partial: true
      rows:
        - draftee_name: Alice
          movie: Movie A
        - draftee_name: Alice
          movie: Movie C
        - draftee_name: Bob
          movie: Movie B


test_draftee_dashboard_movie_multiplier_override:
  model: dashboards.draftee_dashboard
  description: Unreleased movies use combined round and movie multiplier overrides
  inputs:
    cleaned.drafter:
      rows:
        - movie: Special Movie
          name: Alice
          overall_pick: 1
          round: 2
    combined.base_query:
      rows: []
    cleaned.round_multiplier_overrides:
      rows:
        - round: "2"
          multiplier: 2.0
    cleaned.movie_multiplier_overrides:
      rows:
        - movie: Special Movie
          multiplier: 1.5
  outputs:
    query:
      rows:
        - draftee_name: Alice
          round: 2
          overall_pick: 1
          movie: Special Movie
          first_seen_date: null
          still_in_theaters: null
          revenue: null
          multiplier: 3.0
          scored_revenue: null
          better_pick: null
          better_pick_scored_revenue: null
